# gitleaks 설정
#
# 실행:
#   gitleaks git -v .    # 전체 커밋 이력 검사
#   gitleaks dir -v .    # 작업 디렉터리 검사(추적되지 않는 .env 등도 포함)
#
# `dir` 스캔은 .env, Toss_API_KEY.yaml 같은 로컬 비밀 파일까지 읽으므로
# 탐지 결과가 나오는 것이 정상이다. 저장소 공개 여부를 판단할 때는
# `gitleaks git` 결과가 비어 있는지를 기준으로 삼는다.

[extend]
useDefault = true

[[allowlists]]
description = "문서·테스트·예제에서 쓰는 자리표시자 값"
regexTarget = "match"
regexes = [
  # 16진수를 순서대로 나열한 명백한 예시 API Hash
  '''0123456789abcdef0123456789abcdef''',
  # 문서와 스크립트의 교체 안내 문자열
  '''sk-ant-oat01-replace-me''',
  '''123456:replace-me''',
]

[[allowlists]]
description = "로컬 비밀 파일과 빌드 산출물(모두 .gitignore 대상)"
paths = [
  '''^\.env$''',
  '''^Toss_API_KEY\.yaml$''',
  '''^projects\.json$''',
  '''^\.artifacts/''',
  '''^\.dist-builds/''',
  '''^dist/''',
]
